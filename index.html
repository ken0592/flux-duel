<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flux Duel</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">3-choice area duel</p>
          <h1>Flux Duel</h1>
        </div>
        <div class="top-actions">
          <label class="toggle">
            <input id="cpuToggle" type="checkbox" checked>
            <span>CPU Red</span>
          </label>
          <button id="newGameButton" class="secondary-button" type="button">New Game</button>
        </div>
      </header>

      <section class="scorebar" aria-label="Score">
        <div class="score-card blue-card">
          <span>Blue</span>
          <strong id="blueScore">0</strong>
        </div>
        <div class="turn-card">
          <span>Turn</span>
          <strong><span id="turnNumber">1</span>/<span id="turnLimit">12</span></strong>
        </div>
        <div class="score-card red-card">
          <span>Red</span>
          <strong id="redScore">0</strong>
        </div>
      </section>

      <section class="game-grid">
        <aside class="control-panel blue-panel" aria-label="Blue controls">
          <div class="panel-title">
            <h2>Blue</h2>
            <span id="bluePlanLabel">Move / C</span>
          </div>
          <div class="choice-group">
            <span class="group-label">Action</span>
            <div id="blueActions" class="action-row"></div>
          </div>
          <div class="choice-group">
            <span class="group-label">Direction</span>
            <div id="blueDirections" class="direction-pad"></div>
          </div>
          <button id="playTurnButton" class="primary-button" type="button">Play Turn</button>
        </aside>

        <section class="board-zone" aria-label="Game board">
          <div id="board" class="board"></div>
          <div class="legend" aria-label="Legend">
            <span><b class="dot blue-dot"></b>Blue</span>
            <span><b class="dot red-dot"></b>Red</span>
            <span><b class="dot gold-dot"></b>Gold +2</span>
            <span><b class="dot danger-dot"></b>Strike</span>
          </div>
        </section>

        <aside class="control-panel red-panel" aria-label="Red controls">
          <div class="panel-title">
            <h2>Red</h2>
            <span id="redPlanLabel">CPU</span>
          </div>
          <div class="choice-group">
            <span class="group-label">Action</span>
            <div id="redActions" class="action-row"></div>
          </div>
          <div class="choice-group">
            <span class="group-label">Direction</span>
            <div id="redDirections" class="direction-pad"></div>
          </div>
          <div class="state-stack">
            <span id="leadLabel">Even</span>
            <strong id="goldLabel">Gold: open</strong>
          </div>
        </aside>
      </section>

      <section class="log-panel">
        <div class="panel-title">
          <h2>Round Log</h2>
          <button id="clearLogButton" class="tiny-button" type="button">Clear</button>
        </div>
        <ol id="log" class="log"></ol>
      </section>
    </main>

    <div id="resultModal" class="modal-backdrop" hidden>
      <section class="result-modal" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
        <p class="eyebrow">Final score</p>
        <h2 id="resultTitle">Game Complete</h2>
        <p id="resultCopy"></p>
        <button id="modalNewGameButton" class="primary-button" type="button">Play Again</button>
      </section>
    </div>

    <script src="game.js"></script>
  </body>
</html>
