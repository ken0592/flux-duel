<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flux Duel</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Area duel</p>
          <h1>Flux Duel</h1>
        </div>
        <div class="top-actions">
          <label class="toggle">
            <input id="cpuToggle" type="checkbox" checked>
            <span>CPU Red</span>
          </label>
          <button id="newGameButton" class="secondary-button" type="button">New Game</button>
        </div>
      </header>

      <section class="scorebar" aria-label="Score">
        <div class="score-pill blue-pill">
          <span>Blue</span>
          <strong id="blueScore">0</strong>
        </div>
        <div class="turn-pill">
          <span>Turn</span>
          <strong><span id="turnNumber">1</span>/<span id="turnLimit">10</span></strong>
        </div>
        <div class="score-pill red-pill">
          <span>Red</span>
          <strong id="redScore">0</strong>
        </div>
      </section>

      <section class="play-area">
        <aside class="side-panel">
          <div class="panel-title">
            <h2>Blue Move</h2>
            <span id="blueChoiceLabel">Stay</span>
          </div>
          <div id="blueControls" class="move-pad" aria-label="Blue move controls"></div>
          <button id="playTurnButton" class="primary-button" type="button">Play Turn</button>
        </aside>

        <section class="board-wrap" aria-label="Game board">
          <div id="board" class="board"></div>
          <div class="legend" aria-label="Board legend">
            <span><b class="dot blue-dot"></b>Blue</span>
            <span><b class="dot red-dot"></b>Red</span>
            <span><b class="dot gold-dot"></b>Gold x3</span>
            <span><b class="dot clash-dot"></b>Clash</span>
          </div>
        </section>

        <aside class="side-panel red-panel">
          <div class="panel-title">
            <h2>Red Move</h2>
            <span id="redChoiceLabel">CPU</span>
          </div>
          <div id="redControls" class="move-pad" aria-label="Red move controls"></div>
          <div class="round-card">
            <span id="leadLabel">Even</span>
            <strong id="goldLabel">Gold: open</strong>
          </div>
        </aside>
      </section>

      <section class="feed-panel">
        <div class="panel-title">
          <h2>Round Log</h2>
          <button id="clearLogButton" class="tiny-button" type="button">Clear</button>
        </div>
        <ol id="log" class="log"></ol>
      </section>
    </main>

    <div id="resultModal" class="modal-backdrop" hidden>
      <section class="result-modal" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
        <p class="eyebrow">Final score</p>
        <h2 id="resultTitle">Game Complete</h2>
        <p id="resultCopy"></p>
        <button id="modalNewGameButton" class="primary-button" type="button">Play Again</button>
      </section>
    </div>

    <script src="game.js"></script>
  </body>
</html>
